<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Devjoti Kundu</title>
    <meta name="description" content="Insights, writings, and research by Devjoti Kundu." />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-follower" id="cursor-follower"></div>

    <!-- Top Navigation Bar -->
    <nav class="top-nav">
      <div class="nav-container">
        <div class="nav-logo">
          <a href="./index.html#hero">DEVJOTI.</a>
        </div>
        <div class="nav-links">
          <a href="./index.html#hero">Identity</a>
          <a href="./index.html#academics">Academics & Skills</a>
          <a href="./index.html#projects">Research</a>
          <a href="./index.html#blog" class="active">Blog</a>
          <a href="./index.html#contact" class="nav-cta">Connect</a>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
            <svg class="sun-icon" viewBox="0 0 24 24">
              <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18.75a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-1.5a.75.75 0 01.75-.75zM6.166 17.834a.75.75 0 00-1.06 1.06l1.59 1.591a.75.75 0 101.06-1.061l-1.59-1.59zM4.5 12a.75.75 0 01-.75.75H1.5a.75.75 0 010-1.5h2.25a.75.75 0 01.75.75zM6.166 6.166a.75.75 0 011.06-1.06l1.59 1.59a.75.75 0 01-1.06 1.061l-1.59-1.59z" />
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24">
              <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Fixed 3D WebGL Background -->
    <div id="webgl-container"></div>

    <main class="scroll-container blog-page-container">
      <section class="posh-section blog-hero">
        <div class="ambient-glow glow-top-left"></div>
        <div class="ambient-glow glow-bottom-right"></div>
        
        <div class="posh-container">
          <div class="section-header reveal-up">
            <div class="ambient-glow glow-heading"></div>
            <p class="mono-sub">ARCHIVE</p>
            <h1 class="massive-heading">WRITINGS &<br>THOUGHTS</h1>
          </div>
          
          <!-- Filter Bar -->
          <div class="filter-bar reveal-up delay-1">
            <div class="filter-group">
              <span class="filter-label">Sort By:</span>
              <button class="sort-btn active" data-sort="latest">Latest</button>
              <button class="sort-btn" data-sort="popular">Popular</button>
            </div>
            
            <div class="filter-group">
              <span class="filter-label">Topics:</span>
              <button class="topic-btn active" data-topic="all">All</button>
              <button class="topic-btn" data-topic="biotech">Biotech</button>
              <button class="topic-btn" data-topic="data">Data Science</button>
              <button class="topic-btn" data-topic="ai">AI</button>
            </div>
          </div>

          <!-- Blog Grid Container -->
          <div class="blog-grid full-grid reveal-up delay-2" id="blog-grid-container">
            <!-- Tiles will be dynamically injected here by blog.js -->
          </div>
        </div>
      </section>
      
      <!-- Footer -->
      <section class="posh-section footer-section" style="min-height: auto; padding: 6rem 0;">
        <div class="posh-container">
          <div class="centered-line"></div>
          <div style="text-align: center; margin-top: 4rem;">
            <p class="mono-sub">GET IN TOUCH</p>
            <h2 class="massive-cta">LET'S CONNECT.</h2>
            <div style="margin-top: 2rem;">
              <a href="mailto:contact@devjoti.com" class="posh-btn">EMAIL ME</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./cursor.js"></script>
    <script type="module" src="./main.js"></script>
    <script type="module" src="./blog.js"></script>
  </body>
</html>
